name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  pages-unavailable:
    if: ${{ github.event.repository.private }}
    runs-on: ubuntu-latest
    steps:
      - name: Explain skip for private repositories
        run: |
          echo "GitHub Pages deployment is skipped because this repository is private."
          echo "Enable Pages support for private repos via a compatible paid/enterprise plan,"
          echo "or make the repository public, then rerun this workflow."

  build:
    if: ${{ !github.event.repository.private }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    if: ${{ !github.event.repository.private }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
